server {
  listen 80;
  # ВАЖНО: один и тот же контейнер обслуживает и employee CRM, и parent/student app.
  # React-бандл сам определяет режим по window.location.hostname в src/app/App.tsx:
  #   - app.andromeda.kz / app.andromedaedu.kz  -> AppFrontendRoot (parents/students)
  #   - всё остальное (yadro.andromeda.kz, ...) -> employee CRM router
  # `server_name _;` в конце — fallback на случай, если host-proxy маршрутизирует
  # к контейнеру по любому Host-заголовку.
  server_name yadro.andromeda.kz yadro.andromedaedu.kz
              app.andromeda.kz app.andromedaedu.kz
              localhost _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 256;

  location /api/ {
    resolver 127.0.0.11 valid=10s;
    set $backend http://andromeda-backend:8080;
    proxy_pass $backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_read_timeout 60s;
  }

  location / {
    try_files $uri $uri/ /index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
