services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
    container_name: andromeda-frontend
    ports:
      - "${FRONTEND_PORT:-8082}:80"
    restart: unless-stopped
    networks:
      - andromeda-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  andromeda-net:
    external: true
